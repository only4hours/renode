name: build-renode

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # (선택) 스크립트 실행권한 문제 방지용
      - name: Ensure build scripts are executable
        run: |
          chmod +x build.sh || true

      - name: Build (dotnet)
        run: |
          ./build.sh --net

      # ✅ 여기서 -p 대신 -t 사용 (portable tar.gz 생성)
      - name: Package (portable)
        run: |
          ./build.sh -t --net

      - name: Upload artifact (portable package)
        uses: actions/upload-artifact@v4
        with:
          name: renode-portable
          path: output/packages/*.tar.gz
          if-no-files-found: error
